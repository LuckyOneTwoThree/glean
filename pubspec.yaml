name: glean
description: 拾光 — AI 驱动的个性化资讯简报应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 数据库
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.3

  # 安全存储
  flutter_secure_storage: ^9.2.2

  # 网络
  dio: ^5.4.3

  # RSS 解析
  xml: ^6.5.0

  # 国际化
  intl: ^0.19.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10

  # 工具
  uuid: ^4.4.0
  path: ^1.9.0
  collection: ^1.18.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  archive: ^4.0.2
  connectivity_plus: ^6.0.3
  workmanager: ^0.9.0
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "ui/icon_cropped_75.png"
  min_sdk_android: 21
