<style>
        /* Custom Slider Styling for premium feel */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #1A2B3C; /* ink-blue */
            cursor: pointer;
            margin-top: -10px; /* Center relative to track */
            box-shadow: 0 2px 6px rgba(26,43,60,0.2);
            border: 2px solid #FFFFFF;
            transition: transform 0.1s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #E8E8E6; /* soft-grey */
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none;
        }
        
        /* Interactive selection styles */
        .volume-btn.active {
            background-color: #1A2B3C;
            color: #FFFFFF;
            border-color: #1A2B3C;
        }
        .volume-btn {
            transition: all 0.2s ease;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased">
<!-- Navigation Suppressed for Onboarding Flow -->
<main class="flex-1 flex flex-col items-center justify-center p-container-margin w-full max-w-[800px] mx-auto">
<!-- Progress Indicator -->
<div aria-label="Onboarding Progress" class="w-full max-w-sm mb-12 flex gap-2">
<div class="h-1 flex-1 bg-ink-blue rounded-full opacity-30"></div>
<div class="h-1 flex-1 bg-ink-blue rounded-full opacity-30"></div>
<div class="h-1 flex-1 bg-ink-blue rounded-full opacity-30"></div>
<div class="h-1 flex-1 bg-ink-blue rounded-full relative overflow-hidden">
<div class="absolute inset-0 bg-golden-hour rounded-full w-full"></div>
</div>
</div>
<!-- Header -->
<header class="text-center mb-section-gap w-full">
<h1 class="font-headline-xl text-headline-xl text-ink-blue mb-stack-md">Curated Clarity</h1>
<p class="font-body-lg text-body-lg text-text-dimmed">Step 4: Calibrate your daily briefing preferences.</p>
</header>
<!-- Configuration Card -->
<div class="bg-paper-white w-full max-w-md rounded-xl shadow-[0_4px_20px_0_rgba(26,43,60,0.04)] p-8 border border-soft-grey flex flex-col gap-section-gap">
<!-- Section 1: Geographic Focus (Slider) -->
<section class="flex flex-col gap-stack-lg">
<div class="flex justify-between items-end">
<h2 class="font-headline-sm text-headline-sm text-ink-blue">Geographic Focus</h2>
<span class="font-label-md text-label-md text-golden-hour" id="slider-value-display">Balanced (50/50)</span>
</div>
<div class="relative pt-2 pb-6">
<input aria-label="Domestic vs International Ratio" class="w-full" id="geo-slider" max="100" min="0" step="10" type="range" value="50"/>
<div class="flex justify-between w-full mt-4 font-label-sm text-label-sm text-text-dimmed px-1">
<span>Domestic</span>
<span>Global</span>
</div>
</div>
</section>
<!-- Divider -->
<div class="w-full h-[1px] bg-soft-grey"></div>
<!-- Section 2: Daily Volume (Selector) -->
<section class="flex flex-col gap-stack-lg">
<div>
<h2 class="font-headline-sm text-headline-sm text-ink-blue mb-1">Information Density</h2>
<p class="font-body-sm text-body-sm text-text-dimmed">Select your preferred daily reading volume.</p>
</div>
<div class="grid grid-cols-4 gap-3" id="volume-selector">
<button class="volume-btn flex flex-col items-center justify-center p-4 rounded-lg border border-soft-grey bg-paper-white text-ink-blue hover:border-ink-blue hover:bg-surface-container-low" data-value="10">
<span class="font-headline-md text-headline-md leading-none mb-1">10</span>
<span class="font-label-sm text-label-sm text-text-dimmed">Items</span>
</button>
<button class="volume-btn active flex flex-col items-center justify-center p-4 rounded-lg border border-soft-grey bg-paper-white text-ink-blue hover:border-ink-blue hover:bg-surface-container-low" data-value="20">
<span class="font-headline-md text-headline-md leading-none mb-1">20</span>
<span class="font-label-sm text-label-sm text-text-dimmed">Items</span>
</button>
<button class="volume-btn flex flex-col items-center justify-center p-4 rounded-lg border border-soft-grey bg-paper-white text-ink-blue hover:border-ink-blue hover:bg-surface-container-low" data-value="30">
<span class="font-headline-md text-headline-md leading-none mb-1">30</span>
<span class="font-label-sm text-label-sm text-text-dimmed">Items</span>
</button>
<button class="volume-btn flex flex-col items-center justify-center p-4 rounded-lg border border-soft-grey bg-paper-white text-ink-blue hover:border-ink-blue hover:bg-surface-container-low" data-value="50">
<span class="font-headline-md text-headline-md leading-none mb-1">50</span>
<span class="font-label-sm text-label-sm text-text-dimmed">Items</span>
</button>
</div>
</section>
</div>
<!-- Action Area -->
<div class="w-full max-w-md mt-12 flex flex-col items-center gap-4">
<button class="w-full bg-ink-blue text-paper-white font-label-md text-label-md py-4 rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-2 shadow-[0_4px_20px_0_rgba(26,43,60,0.08)]">
                Complete Setup
                <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
<button class="font-label-sm text-label-sm text-text-dimmed hover:text-ink-blue transition-colors bg-transparent border-none">
                Skip for now
            </button>
</div>
</main>
<script>
        // Interactive Logic for Slider
        const slider = document.getElementById('geo-slider');
        const sliderDisplay = document.getElementById('slider-value-display');

        slider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if (val < 30) {
                sliderDisplay.textContent = 'Mostly Domestic';
            } else if (val > 70) {
                sliderDisplay.textContent = 'Mostly Global';
            } else if (val === 50) {
                sliderDisplay.textContent = 'Balanced (50/50)';
            } else if (val < 50) {
                sliderDisplay.textContent = 'Slightly Domestic';
            } else {
                sliderDisplay.textContent = 'Slightly Global';
            }
        });

        // Interactive Logic for Volume Buttons
        const volumeButtons = document.querySelectorAll('.volume-btn');
        volumeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all
                volumeButtons.forEach(b => {
                    b.classList.remove('active');
                    // Reset to inactive styles manually if needed, though CSS handles it mostly
                    b.querySelector('.text-text-dimmed').style.color = ''; 
                });
                // Add active class to clicked
                btn.classList.add('active');
                // Adjust inner text color for active state to ensure contrast against dark bg
                btn.querySelector('.text-text-dimmed').style.color = '#B7C8DE'; // primary-fixed-dim equivalent for readability
            });
        });
        
        // Init active state inner text color
        document.querySelector('.volume-btn.active .text-text-dimmed').style.color = '#B7C8DE';
    </script>
</body></html>
