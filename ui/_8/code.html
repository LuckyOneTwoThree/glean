<!-- Interactive Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const steps = [
                { id: 'step-1', progress: '0%' },
                { id: 'step-2', progress: '50%' },
                { id: 'step-3', progress: '100%' }
            ];
            
            const progressFill = document.getElementById('progress-fill');
            const headline = document.getElementById('main-headline');
            const completionAction = document.getElementById('completion-action');

            // Helper to set state styles
            const setStepState = (elementId, state) => {
                const el = document.getElementById(elementId);
                const iconContainer = el.querySelector('.step-icon-container');
                const icon = el.querySelector('.step-icon');
                const title = el.querySelector('.step-title');
                
                el.classList.remove('active', 'completed');
                
                if (state === 'active') {
                    el.classList.add('active');
                    iconContainer.classList.remove('border-soft-grey');
                    iconContainer.classList.add('border-ink-blue', 'shadow-[0_0_12px_rgba(26,43,60,0.1)]');
                    icon.classList.remove('text-text-dimmed');
                    icon.classList.add('text-ink-blue', 'animate-pulse-slow');
                    title.classList.add('text-ink-blue');
                } else if (state === 'completed') {
                    el.classList.add('completed');
                    iconContainer.classList.remove('border-ink-blue', 'border-soft-grey', 'bg-paper-white');
                    iconContainer.classList.add('bg-ink-blue', 'border-ink-blue');
                    icon.classList.remove('text-ink-blue', 'text-text-dimmed', 'animate-pulse-slow');
                    icon.classList.add('text-paper-white', 'filled');
                    icon.textContent = 'check'; // Change icon to check
                    title.classList.remove('text-ink-blue');
                }
            };

            // Simulation Sequence
            const runSimulation = async () => {
                // Initial short delay
                await new Promise(r => setTimeout(r, 800));

                // Step 1 Active
                setStepState('step-1', 'active');
                
                await new Promise(r => setTimeout(r, 2000));
                
                // Step 1 Complete, Step 2 Active
                setStepState('step-1', 'completed');
                setStepState('step-2', 'active');
                progressFill.style.height = '50%';
                
                await new Promise(r => setTimeout(r, 2500));
                
                // Step 2 Complete, Step 3 Active
                setStepState('step-2', 'completed');
                setStepState('step-3', 'active');
                progressFill.style.height = '100%';
                
                await new Promise(r => setTimeout(r, 2000));
                
                // All Complete
                setStepState('step-3', 'completed');
                
                // Update Final UI
                headline.classList.remove('shimmer-text');
                headline.textContent = "今日简报已就绪";
                
                completionAction.classList.remove('opacity-0', 'translate-y-4');
                completionAction.classList.add('opacity-100', 'translate-y-0');
            };

            runSimulation();
        });
    </script>
